<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>L</text></svg>" />
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">Lars Schultz Hansen</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/articles' | relative_url }}" {% if page.url contains '/articles' %}class="active"{% endif %}>Articles</a></li>
        <li><a href="https://www.linkedin.com/in/lars-schultz-hansen-97a7113/" target="_blank" rel="noopener">LinkedIn</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <span>© {{ 'now' | date: "%Y" }} Lars Schultz Hansen</span>
      <a href="https://www.linkedin.com/in/lars-schultz-hansen-97a7113/" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </footer>

</body>
</html>
