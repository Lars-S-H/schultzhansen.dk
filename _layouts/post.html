---
layout: default
---

<a href="{{ '/articles' | relative_url }}" class="back-link">← Articles</a>

<div class="post-header">
  <div class="post-header-inner reveal">
    <div class="post-kicker">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </div>
</div>

<div class="post-body reveal">
  {{ content }}
</div>
