---
layout: default
---

<div class="container">
  <a href="{{ '/articles' | relative_url }}" class="back-link">← Articles</a>

  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</div>
